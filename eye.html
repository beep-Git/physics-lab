<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>눈 모형 및 시력 교정 시뮬레이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background-color: #f7f9fa;
      font-family: 'Malgun Gothic', sans-serif;
    }
    canvas {
      display: block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 4px;
      background-color: #ffffff;
    }
    #ui-container {
      margin-top: 15px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #eaeaea;
    }
    .active-btn {
      background-color: #007bff !important;
      color: white !important;
      border-color: #0056b3 !important;
    }
  </style>
</head>
<body>

<div id="ui-container"></div>

<script>
let zoom = 1.0;
let dragging = false;

// 위치 설계 (안구 중심을 기준으로 정렬)
let eyeCenterX = 150; // 안구 원의 중심 X 좌표
let eyeRadius = 220;  // 안구 지름 (반지름 110)
let lensX = eyeCenterX - 110; // 수정체 X 위치 (안구 왼쪽 가장자리 벽면: X = 40)
let retinaX = eyeCenterX + 110; // 망막 중심 X 위치 (X = 260)

// 물리 법칙 변수
let objX = -320;     // 물체 위치
let objH = -90;     // 물체 높이
let f_eye = 220;    // 수정체의 기본 초점 거리 (정상안일 때 딱 망막에 맞춤)

// 상태 제어 변수
let eyeMode = 'normal';   // 'normal', 'myopia', 'hyperopia'
let glassesMode = 'none';  // 'none', 'concave', 'convex'

// UI 버튼 변수
let btnNormal, btnMyopia, btnHyperopia;
let btnNone, btnConcave, btnConvex;

function setup() {
  createCanvas(1000, 550);
  
  let btnDiv = select('#ui-container');
  
  btnNormal = createButton('정상안(눈모형)').parent(btnDiv).mousePressed(() => setEyeMode('normal'));
  btnMyopia = createButton('근시안').parent(btnDiv).mousePressed(() => setEyeMode('myopia'));
  btnHyperopia = createButton('원시안').parent(btnDiv).mousePressed(() => setEyeMode('hyperopia'));
  
  btnNone = createButton('맨눈').parent(btnDiv).mousePressed(() => setGlassesMode('none'));
  btnConcave = createButton('오목렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('concave'));
  btnConvex = createButton('볼록렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('convex'));
  
  updateButtonStyles();
}

function setEyeMode(mode) {
  eyeMode = mode;
  if (mode === 'normal') {
    f_eye = 220; // 상이 망막(retinaX = 260)에 정확히 맺힘
  } else if (mode === 'myopia') {
    f_eye = 175; // 굴절력이 강해져서 상이 앞쪽에 맺힘
  } else if (mode === 'hyperopia') {
    f_eye = 280; // 굴절력이 약해서 상이 뒤쪽에 맺힘
  }
  updateButtonStyles();
}

function setGlassesMode(mode) {
  glassesMode = mode;
  updateButtonStyles();
}

function updateButtonStyles() {
  btnNormal.removeClass('active-btn'); btnMyopia.removeClass('active-btn'); btnHyperopia.removeClass('active-btn');
  if(eyeMode === 'normal') btnNormal.addClass('active-btn');
  if(eyeMode === 'myopia') btnMyopia.addClass('active-btn');
  if(eyeMode === 'hyperopia') btnHyperopia.addClass('active-btn');

  btnNone.removeClass('active-btn'); btnConcave.removeClass('active-btn'); btnConvex.removeClass('active-btn');
  if(glassesMode === 'none') btnNone.addClass('active-btn');
  if(glassesMode === 'concave') btnConcave.addClass('active-btn');
  if(glassesMode === 'convex') btnConvex.addClass('active-btn');
}

function draw() {
  background(255);
  
  push();
  translate(width / 2 - 100, height / 2); // 안구 시스템 전체를 약간 왼쪽으로 밀어 시각적 균형 확보
  scale(zoom);

  // 주축(광학축)
  stroke(180); strokeWeight(1 / zoom);
  line(-width, 0, width, 0);

  // 1. 안구(공막) 바탕 및 망막(Retina) 시각화
  stroke(200); strokeWeight(2 / zoom); noFill();
  ellipse(eyeCenterX, 0, eyeRadius, eyeRadius);
  
  // 망막 노란색 레이어 (안구 뒤편 호)
  stroke(255, 195, 0); strokeWeight(5 / zoom);
  arc(eyeCenterX, 0, eyeRadius, eyeRadius, -HALF_PI + 0.2, HALF_PI - 0.2);
  
  fill(80); noStroke(); textSize(13 / zoom);
  text("망막", retinaX + 12, 5);

  // 2. 수정체(렌즈) 디자인 변경: 얇고 안구 전면 곡률에 딱 붙게 구현
  stroke(0, 150, 255); strokeWeight(2.5 / zoom); noFill();
  let thicknessHalf = (eyeMode === 'myopia') ? 16 : (eyeMode === 'hyperopia' ? 8 : 12);
  
  push();
  translate(lensX, 0);
  beginShape();
  // 안구 전면 곡률과 일치하도록 호를 그리며 얇게 밀착
  for(let a = -0.6; a <= 0.6; a += 0.05) vertex(cos(a)*15 - 15 + thicknessHalf, sin(a)*110);
  for(let a = 0.6; a >= -0.6; a -= 0.05) vertex(-cos(a)*15 + 15 - thicknessHalf, sin(a)*110);
  endShape(CLOSE);
  pop();
  fill(80); noStroke(); text("수정체", lensX - 18, 125);

  // 3. 안경 렌즈 그리기 (수정체 앞쪽 적당한 거리)
  let glassX = lensX - 60;
  if (glassesMode !== 'none') {
