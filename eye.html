<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>눈 모형 및 시력 교정 시뮬레이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background-color: #f7f9fa;
      font-family: 'Malgun Gothic', sans-serif;
    }
    canvas {
      display: block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 4px;
      background-color: #ffffff;
    }
    #ui-container {
      margin-top: 15px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #eaeaea;
    }
    .active-btn {
      background-color: #007bff !important;
      color: white !important;
      border-color: #0056b3 !important;
    }
  </style>
</head>
<body>

<div id="ui-container"></div>

<script>
let zoom = 1.0;
let dragging = false;

// 위치 설계 (안구 중심을 기준으로 정렬)
let eyeCenterX = 150; // 안구 원의 중심 X 좌표
let eyeRadius = 220;  // 안구 지름 (반지름 110)
let lensX = eyeCenterX - 110; // 수정체 X 위치 (안구 왼쪽 가장자리 벽면: X = 40)
let retinaX = eyeCenterX + 110; // 망막 중심 X 위치 (X = 260)

// 물리 법칙 변수
let objX = -320;     // 물체 위치
let objH = -90;     // 물체 높이
let f_eye = 220;    // 수정체의 기본 초점 거리 (정상안일 때 딱 망막에 맞춤)

// 상태 제어 변수
let eyeMode = 'normal';   // 'normal', 'myopia', 'hyperopia'
let glassesMode = 'none';  // 'none', 'concave', 'convex'

// UI 버튼 변수
let btnNormal, btnMyopia, btnHyperopia;
let btnNone, btnConcave, btnConvex;

function setup() {
  createCanvas(1000, 550);
  
  let btnDiv = select('#ui-container');
  
  btnNormal = createButton('정상안(눈모형)').parent(btnDiv).mousePressed(() => setEyeMode('normal'));
  btnMyopia = createButton('근시안').parent(btnDiv).mousePressed(() => setEyeMode('myopia'));
  btnHyperopia = createButton('원시안').parent(btnDiv).mousePressed(() => setEyeMode('hyperopia'));
  
  btnNone = createButton('맨눈').parent(btnDiv).mousePressed(() => setGlassesMode('none'));
  btnConcave = createButton('오목렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('concave'));
  btnConvex = createButton('볼록렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('convex'));
  
  updateButtonStyles();
}

function setEyeMode(mode) {
  eyeMode = mode;
  if (mode === 'normal') {
    f_eye = 220; // 상이 망막(retinaX = 260)에 정확히 맺힘
  } else if (mode === 'myopia') {
    f_eye = 175; // 굴절력이 강해져서 상이 앞쪽에 맺힘
  } else if (mode === 'hyperopia') {
    f_eye = 280; // 굴절력이 약해서 상이 뒤쪽에 맺힘
  }
  updateButtonStyles();
}

function setGlassesMode(mode) {
  glassesMode = mode;
  updateButtonStyles();
}

function updateButtonStyles() {
  btnNormal.removeClass('active-btn'); btnMyopia.removeClass('active-btn'); btnHyperopia.removeClass('active-btn');
  if(eyeMode === 'normal') btnNormal.addClass('active-btn');
  if(eyeMode === 'myopia') btnMyopia.addClass('active-btn');
  if(eyeMode === 'hyperopia') btnHyperopia.addClass('active-btn');

  btnNone.removeClass('active-btn'); btnConcave.removeClass('active-btn'); btnConvex.removeClass('active-btn');
  if(glassesMode === 'none') btnNone.addClass('active-btn');
  if(glassesMode === 'concave') btnConcave.addClass('active-btn');
  if(glassesMode === 'convex') btnConvex.addClass('active-btn');
}

function draw() {
  background(255);
  
  push();
  translate(width / 2 - 100, height / 2); // 안구 시스템 전체를 약간 왼쪽으로 밀어 시각적 균형 확보
  scale(zoom);

  // 주축(광학축)
  stroke(180); strokeWeight(1 / zoom);
  line(-width, 0, width, 0);

  // 1. 안구(공막) 바탕 및 망막(Retina) 시각화
  stroke(200); strokeWeight(2 / zoom); noFill();
  ellipse(eyeCenterX, 0, eyeRadius, eyeRadius);
  
  // 망막 노란색 레이어 (안구 뒤편 호)
  stroke(255, 195, 0); strokeWeight(5 / zoom);
  arc(eyeCenterX, 0, eyeRadius, eyeRadius, -HALF_PI + 0.2, HALF_PI - 0.2);
  
  fill(80); noStroke(); textSize(13 / zoom);
  text("망막", retinaX + 12, 5);

  // 2. 수정체(렌즈) 디자인 변경: 얇고 안구 전면 곡률에 딱 붙게 구현
  stroke(0, 150, 255); strokeWeight(2.5 / zoom); noFill();
  let thicknessHalf = (eyeMode === 'myopia') ? 16 : (eyeMode === 'hyperopia' ? 8 : 12);
  
  push();
  translate(lensX, 0);
  beginShape();
  // 안구 전면 곡률과 일치하도록 호를 그리며 얇게 밀착
  for(let a = -0.6; a <= 0.6; a += 0.05) vertex(cos(a)*15 - 15 + thicknessHalf, sin(a)*110);
  for(let a = 0.6; a >= -0.6; a -= 0.05) vertex(-cos(a)*15 + 15 - thicknessHalf, sin(a)*110);
  endShape(CLOSE);
  pop();
  fill(80); noStroke(); text("수정체", lensX - 18, 125);

  // 3. 안경 렌즈 그리기 (수정체 앞쪽 적당한 거리)
  let glassX = lensX - 60;
  if (glassesMode !== 'none') {
    stroke(0, 180, 180); strokeWeight(2.5 / zoom); noFill();
    if (glassesMode === 'concave') {
      line(glassX - 8, -60, glassX + 8, -60);
      line(glassX - 8, 60, glassX + 8, 60);
      arc(glassX - 18, 0, 30, 120, -HALF_PI+0.2, HALF_PI-0.2);
      arc(glassX + 18, 0, 30, 120, HALF_PI+0.2, -HALF_PI-0.2);
    } else if (glassesMode === 'convex') {
      beginShape();
      for(let a = -0.5; a <= 0.5; a += 0.1) vertex(glassX + cos(a)*16 - 13, sin(a)*120);
      for(let a = 0.5; a >= -0.5; a -= 0.1) vertex(glassX - cos(a)*16 + 13, sin(a)*120);
      endShape(CLOSE);
    }
  }

  // 4. 물체 제어 및 그리기
  if (dragging) {
    objX = (mouseX - (width / 2 - 100)) / zoom;
    objH = (mouseY - height / 2) / zoom;
    if(objX > glassX - 20) objX = glassX - 20; 
  }
  drawArrow(objX, 0, objX, objH, color(0, 200, 0), 5);

  // 5. 물리 법칙 계산 기반 광선 추적 (Ray Tracing)
  // 안경 초점 정의
  let f_glass = (glassesMode === 'concave') ? -260 : (glassesMode === 'convex' ? 400 : Infinity);
  
  // 주축 평행선이 안경을 거쳐 수정체 면에 도달할 때의 Y 하이트 계산
  let r1_yLens = objH; 
  if (glassesMode !== 'none') {
    let d_to_glass = glassX - objX;
    let alpha = objH / -f_glass;
    r1_yLens = objH + alpha * (lensX - glassX);
  }

  // 조합 교정 매트릭스 계산
  let eff_f = f_eye;
  if (eyeMode === 'myopia' && glassesMode === 'concave') eff_f = 220;   // 근시 교정 -> 정상화
  if (eyeMode === 'hyperopia' && glassesMode === 'convex') eff_f = 220; // 원시 교정 -> 정상화
  if (eyeMode === 'myopia' && glassesMode === 'convex') eff_f = 140;    // 역효과
  if (eyeMode === 'hyperopia' && glassesMode === 'concave') eff_f = 350;  // 역효과

  let do_dist = lensX - objX;
  let relativeImgX = (do_dist * eff_f) / (do_dist - eff_f);
  let imgX = lensX + relativeImgX;
  let imgH = -(relativeImgX / do_dist) * objH;

  // --- 광선 1 그리기 (평행 유도 굴절선) ---
  stroke(255, 120, 0); strokeWeight(2 / zoom); noFill();
  if (glassesMode !== 'none') {
    line(objX, objH, glassX, objH);
    line(glassX, objH, lensX, r1_yLens);
  } else {
    line(objX, objH, lensX, objH);
  }
  line(lensX, r1_yLens, imgX, imgH); // 수정체에서 상점까지
  line(imgX, imgH, width, r1_yLens + (imgH - r1_yLens) * ((width - lensX) / relativeImgX)); // 안구 후방 연장

  // --- 광선 2 그리기 (수정체 원점 관통 주선) ---
  stroke(0, 0, 255);
  line(objX, objH, lensX, 0); // 물체 끝에서 수정체 중심(lensX, 0)까지 직선
  line(lensX, 0, width, (objH / (objX - lensX)) * -(width - lensX)); // 관통 직진선

  // 6. 상 화살표 드로잉 (망막 핀트 일치도 계산)
  let distToRetina = abs(imgX - retinaX);
  let opacity = map(distToRetina, 0, 120, 255, 30);
  opacity = constrain(opacity, 30, 255);
  
  let imgColor = color(255, 0, 150, opacity);
  drawArrow(imgX, 0, imgX, imgH, imgColor, 4);

  pop();
  
  // 가이드라인 정보 텍스트
  fill(40); noStroke(); textSize(15);
  let statusText = "💡 현재 상태: ";
  if (eyeMode === 'normal' && glassesMode === 'none') statusText += "정상안입니다. 초점이 망막에 정확히 일치합니다.";
  else if (eyeMode === 'myopia' && glassesMode === 'none') statusText += "근시안입니다. 수정체가 두꺼워 상이 망막 앞에 맺힙니다.";
  else if (eyeMode === 'myopia' && glassesMode === 'concave') statusText += "근시 교정 완료! 오목렌즈가 빛을 퍼뜨려 상을 망막 위로 밀어줍니다.";
  else if (eyeMode === 'hyperopia' && glassesMode === 'none') statusText += "원시안입니다. 수정체가 얇아 상이 망막 뒤에 맺힙니다.";
  else if (eyeMode === 'hyperopia' && glassesMode === 'convex') statusText += "원시 교정 완료! 볼록렌즈가 빛을 모아 상을 망막 위로 당겨줍니다.";
  else statusText += "잘못된 안경 선택으로 초점이 망막에서 더 멀어집니다.";
  
  text(statusText, 25, 40);
}

function drawArrow(x1, y1, x2, y2, clr, sz) {
  stroke(clr); strokeWeight(sz / zoom);
  line(x1, y1, x2, y2);
  push();
  translate(x2, y2);
  let angle = atan2(y2 - y1, x2 - x1);
  rotate(angle);
  fill(clr); noStroke();
  let headSize = 10 / zoom;
  triangle(0, 0, -headSize, -headSize/2, -headSize, headSize/2);
  pop();
}

function mousePressed() {
  let d = dist((mouseX - (width/2 - 100))/zoom, (mouseY - height/2)/zoom, objX, objH);
  if (d < 30) dragging = true;
}

function mouseReleased() {
  dragging = false;
}
</script>

</body>
</html>
