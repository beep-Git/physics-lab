<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>눈 모형 및 시력 교정 시뮬레이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background-color: #f7f9fa;
      font-family: 'Malgun Gothic', sans-serif;
    }
    canvas {
      display: block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 4px;
      background-color: #ffffff;
    }
    #ui-container {
      margin-top: 15px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #eaeaea;
    }
    .active-btn {
      background-color: #007bff !important;
      color: white !important;
      border-color: #0056b3 !important;
    }
  </style>
</head>
<body>

<div id="ui-container"></div>

<script>
let zoom = 1.0;

// [고정 좌표계 기하학 설계]
let eyeCenterX = 180;          // 안구 중심 X
let eyeRadius = 240;           // 안구 지름 (반지름 120)
let lensX = eyeCenterX - 120;   // 수정체 중심 X 위치 (X = 60)
let retinaX = eyeCenterX + 120; // 망막 중심 X 위치 (X = 300)

// [물체 고정 설정]
let objX = -300;     
let objH = -70;      

// 상태 제어 변수
let eyeMode = 'normal';   
let glassesMode = 'none';  

// UI 버튼 변수
let btnNormal, btnMyopia, btnHyperopia;
let btnNone, btnConcave, btnConvex;

function setup() {
  createCanvas(1000, 550);
  
  let btnDiv = select('#ui-container');
  
  btnNormal = createButton('정상안(눈모형)').parent(btnDiv).mousePressed(() => setEyeMode('normal'));
  btnMyopia = createButton('근시안').parent(btnDiv).mousePressed(() => setEyeMode('myopia'));
  btnHyperopia = createButton('원시안').parent(btnDiv).mousePressed(() => setEyeMode('hyperopia'));
  
  btnNone = createButton('맨눈').parent(btnDiv).mousePressed(() => setGlassesMode('none'));
  btnConcave = createButton('오목렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('concave'));
  btnConvex = createButton('볼록렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('convex'));
  
  updateButtonStyles();
}

function setEyeMode(mode) {
  eyeMode = mode;
  updateButtonStyles();
}

function setGlassesMode(mode) {
  glassesMode = mode;
  updateButtonStyles();
}

function updateButtonStyles() {
  btnNormal.removeClass('active-btn'); btnMyopia.removeClass('active-btn'); btnHyperopia.removeClass('active-btn');
  if(eyeMode === 'normal') btnNormal.addClass('active-btn');
  if(eyeMode === 'myopia') btnMyopia.addClass('active-btn');
  if(eyeMode === 'hyperopia') btnHyperopia.addClass('active-btn');

  btnNone.removeClass('active-btn'); btnConcave.removeClass('active-btn'); btnConvex.removeClass('active-btn');
  if(glassesMode === 'none') btnNone.addClass('active-btn');
  if(glassesMode === 'concave') btnConcave.addClass('active-btn');
  if(glassesMode === 'convex') btnConvex.addClass('active-btn');
}

function draw() {
  background(255);
  
  push();
  translate(width / 2 - 120, height / 2); 
  scale(zoom);

  // 주축 (광학 주축선)
  stroke(200); strokeWeight(1 / zoom);
  line(-width, 0, width, 0);

  // 1. 안구 윤곽선
  stroke(210); strokeWeight(2 / zoom); noFill();
  ellipse(eyeCenterX, 0, eyeRadius, eyeRadius);
  
  // 황금색 망막(Retina) 레이어
  stroke(255, 195, 0); strokeWeight(5 / zoom);
  arc(eyeCenterX, 0, eyeRadius, eyeRadius, -HALF_PI + 0.25, HALF_PI - 0.25);
  
  fill(80); noStroke(); textSize(13 / zoom);
  text("망막", retinaX + 12, 5);

  // 2. 수정체 (큰 볼록렌즈 형태)
  stroke(0, 150, 255); strokeWeight(2.5 / zoom); noFill();
  let thickness = (eyeMode === 'myopia') ? 35 : (eyeMode === 'hyperopia' ? 18 : 25);
  
  push();
  translate(lensX, 0);
  beginShape();
  for(let a = -0.45; a <= 0.45; a += 0.05) vertex(cos(a)*40 - 40 + thickness, sin(a)*200);
  for(let a = 0.45; a >= -0.45; a -= 0.05) vertex(-cos(a)*40 + 40 - thickness, sin(a)*200);
  endShape(CLOSE);
  pop();
  fill(80); noStroke(); text("수정체", lensX - 18, 120);

  // 3. [요청 반영] 안경 렌즈 크기 대폭 확대 (X = lensX - 70 위치, 세로 높이 190 스케일)
  let glassX = lensX - 70;
  if (glassesMode !== 'none') {
    stroke(0, 180, 180); strokeWeight(2.5 / zoom); noFill();
    if (glassesMode === 'concave') {
      // 대형 오목안경 디자인 구조 정의
      beginShape();
      vertex(glassX - 15, -95); vertex(glassX + 15, -95);
      for(let a = -0.45; a <= 0.45; a += 0.05) vertex(glassX - cos(a)*30 + 40, sin(a)*190);
      vertex(glassX + 15, 95); vertex(glassX - 15, 95);
      for(let a = 0.45; a >= -0.45; a -= 0.05) vertex(glassX + cos(a)*30 - 40, sin(a)*190);
      endShape(CLOSE);
    } else if (glassesMode === 'convex') {
      // 대형 볼록안경 디자인 구조 정의
      beginShape();
      for(let a = -0.45; a <= 0.45; a += 0.05) vertex(glassX + cos(a)*30 - 25, sin(a)*190);
      for(let a = 0.45; a >= -0.45; a -= 0.05) vertex(glassX - cos(a)*30 + 25, sin(a)*190);
      endShape(CLOSE);
    }
  }

  // 4. 고정된 물체(초록색 화살표) 그리기
  drawArrow(objX, 0, objX, objH, color(0, 200, 0), 5);

  // 5. 기하광학 기반 상태별 이미지 초점 거리 설정
  let targetImgX = retinaX; 
  
  if (eyeMode === 'myopia') {
    targetImgX = retinaX - 50; 
    if (glassesMode === 'concave') targetImgX = retinaX; 
    if (glassesMode === 'convex') targetImgX = retinaX - 85; 
  } else if (eyeMode === 'hyperopia') {
    targetImgX = retinaX + 60; 
    if (glassesMode === 'convex') targetImgX = retinaX;  
    if (glassesMode === 'concave') targetImgX = retinaX + 100;
  }

  let relativeImgX = targetImgX - lensX; 
  let imgH = -(relativeImgX / (lensX - objX)) * objH * 0.7; 

  // 6. 안경 유무에 따른 주황색 광선 경로 처리
  stroke(255, 120, 0); strokeWeight(2 / zoom); noFill();
  
  let r1_yLens = objH; 
  if (glassesMode !== 'none') {
    let f_glass = (glassesMode === 'concave') ? -350 : 450;
    let alpha = objH / -f_glass;
    r1_yLens = objH + alpha * (lensX - glassX);
    
    line(objX, objH, glassX, objH);      // 물체 -> 안경면 (큰 안경 렌즈를 정통으로 통과)
    line(glassX, objH, lensX, r1_yLens);  // 안경면 -> 수정체 중심선
  } else {
    line(objX, objH, lensX, objH);      // 맨눈: 물체 -> 수정체 중심선 직접 평행
  }
  line(lensX, r1_yLens, targetImgX, imgH); 
  line(targetImgX, imgH, width, r1_yLens + (imgH - r1_yLens) * ((width - lensX) / relativeImgX)); 

  // --- 파란색 광선: 수정체 정중앙 (lensX, 0)을 꺾임 없이 직선 관통 ---
  stroke(0, 0, 255);
  line(objX, objH, width, (objH / (objX - lensX)) * (width - lensX));

  // 7. 안구 내부에 실제 물리적 초점(F) 마커 표시
  let f_val = (lensX - objX) * relativeImgX / (lensX - objX + relativeImgX); 
  let focusX = lensX + f_val;
  
  if (focusX > lensX && focusX < retinaX + 120) {
    fill(0); noStroke();
    ellipse(focusX, 0, 6, 6);
    textSize(11 / zoom);
    text("F", focusX - 3, 18);
  }

  // 8. 맺히는 상 (분홍색 화살표) 표현
  let distToRetina = abs(targetImgX - retinaX);
  let opacity = map(distToRetina, 0, 80, 255, 40);
  opacity = constrain(opacity, 40, 255);
  
  let imgColor = color(255, 0, 150, opacity);
  drawArrow(targetImgX, 0, targetImgX, imgH, imgColor, 4);

  pop();
  
  // 하단 메시지 창
  fill(40); noStroke(); textSize(15);
  let statusText = "💡 현재 상태: ";
  if (eyeMode === 'normal' && glassesMode === 'none') statusText += "정상안입니다. 초점이 망막에 정확히 일치합니다.";
  else if (eyeMode === 'myopia' && glassesMode === 'none') statusText += "근시안입니다. 수정체가 두꺼워 상이 망막 앞에 맺힙니다.";
  else if (eyeMode === 'myopia' && glassesMode === 'concave') statusText += "근시 교정 완료! 오목렌즈가 빛을 적절히 퍼뜨려 초점을 망막 위로 밀어줍니다.";
  else if (eyeMode === 'hyperopia' && glassesMode === 'none') statusText += "원시안입니다. 수정체가 얇아 상이 망막 뒤에 맺힙니다.";
  else if (eyeMode === 'hyperopia' && glassesMode === 'convex') statusText += "원시 교정 완료! 볼록렌즈가 빛을 미리 모아주어 초점을 망막 위로 당겨줍니다.";
  else statusText += "잘못된 안경 렌즈 선택으로 초점이 망막에서 더욱 멀어집니다.";
  
  text(statusText, 25, 40);
}

function drawArrow(x1, y1, x2, y2, clr, sz) {
  stroke(clr); strokeWeight(sz / zoom);
  line(x1, y1, x2, y2);
  push();
  translate(x2, y2);
  let angle = atan2(y2 - y1, x2 - x1);
  rotate(angle);
  fill(clr); noStroke();
  let headSize = 10 / zoom;
  triangle(0, 0, -headSize, -headSize/2, -headSize, headSize/2);
  pop();
}
</script>

</body>
</html>
