<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>눈 모형 및 시력 교정 시뮬레이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background-color: #f7f9fa;
      font-family: 'Malgun Gothic', sans-serif;
    }
    canvas {
      display: block;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border-radius: 4px;
      background-color: #ffffff;
    }
    #ui-container {
      margin-top: 15px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #eaeaea;
    }
    .active-btn {
      background-color: #007bff !important;
      color: white !important;
      border-color: #0056b3 !important;
    }
  </style>
</head>
<body>

<div id="ui-container"></div>

<script>
let zoom = 1.0;
let dragging = false;

// [좌표계 설계 정의] 안구 중심을 원점으로 두고 상대 좌표 계산
let eyeCenterX = 160;  // 안구 중심 X
let eyeRadius = 240;   // 안구 지름 (반지름 120)
let lensX = eyeCenterX - 120;   // 수정체 정중앙 X 위치 (X = 40)
let retinaX = eyeCenterX + 120; // 망막 정중앙 X 위치 (X = 280)

// 물리 법칙 변수
let objX = -320;     // 물체 위치
let objH = -90;      // 물체 높이
let f_eye = 186.67;  // 정상안 기본 초점 거리 (물체 -320일 때 이미지 X가 딱 280에 맺히도록 역산)

// 상태 제어 변수
let eyeMode = 'normal';   
let glassesMode = 'none';  

// UI 버튼 변수
let btnNormal, btnMyopia, btnHyperopia;
let btnNone, btnConcave, btnConvex;

function setup() {
  createCanvas(1000, 550);
  
  let btnDiv = select('#ui-container');
  
  btnNormal = createButton('정상안(눈모형)').parent(btnDiv).mousePressed(() => setEyeMode('normal'));
  btnMyopia = createButton('근시안').parent(btnDiv).mousePressed(() => setEyeMode('myopia'));
  btnHyperopia = createButton('원시안').parent(btnDiv).mousePressed(() => setEyeMode('hyperopia'));
  
  btnNone = createButton('맨눈').parent(btnDiv).mousePressed(() => setGlassesMode('none'));
  btnConcave = createButton('오목렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('concave'));
  btnConvex = createButton('볼록렌즈 덧대기').parent(btnDiv).mousePressed(() => setGlassesMode('convex'));
  
  updateButtonStyles();
}

function setEyeMode(mode) {
  eyeMode = mode;
  if (mode === 'normal') {
    f_eye = 186.67; // 정상안: 물체 거리 대비 상이 정확히 280(망막)에 안착
  } else if (mode === 'myopia') {
    f_eye = 155;    // 근시안: 수정체가 두꺼워져 빛을 강하게 꺾음 (상이 앞에 맺힘)
  } else if (mode === 'hyperopia') {
    f_eye = 230;    // 원시안: 수정체가 얇아져 빛을 약하게 꺾음 (상이 뒤에 맺힘)
  }
  updateButtonStyles();
}

function setGlassesMode(mode) {
  glassesMode = mode;
  updateButtonStyles();
}

function updateButtonStyles() {
  btnNormal.removeClass('active-btn'); btnMyopia.removeClass('active-btn'); btnHyperopia.removeClass('active-btn');
  if(eyeMode === 'normal') btnNormal.addClass('active-btn');
  if(eyeMode === 'myopia') btnMyopia.addClass('active-btn');
  if(eyeMode === 'hyperopia') btnHyperopia.addClass('active-btn');

  btnNone.removeClass('active-btn'); btnConcave.removeClass('active-btn'); btnConvex.removeClass('active-btn');
  if(glassesMode === 'none') btnNone.addClass('active-btn');
  if(glassesMode === 'concave') btnConcave.addClass('active-btn');
  if(glassesMode === 'convex') btnConvex.addClass('active-btn');
}

function draw() {
  background(255);
  
  push();
  translate(width / 2 - 120, height / 2); // 안구가 오른쪽에 있으므로 시각 균형을 위해 왼쪽으로 평행이동
  scale(zoom);

  // 주축 (광학 주축선)
  stroke(200); strokeWeight(1 / zoom);
  line(-width, 0, width, 0);

  // 1. 안구 가이드라인 바탕 윤곽선 그리기
  stroke(210); strokeWeight(2 / zoom); noFill();
  ellipse(eyeCenterX, 0, eyeRadius, eyeRadius);
  
  // 황금색 망막(Retina) 레이어
  stroke(255, 195, 0); strokeWeight(5 / zoom);
  arc(eyeCenterX, 0, eyeRadius, eyeRadius, -HALF_PI + 0.25, HALF_PI - 0.25);
  
  fill(80); noStroke(); textSize(13 / zoom);
  text("망막", retinaX + 12, 5);

  // 2. 수정체 디자인 수정: 곡률을 가늘고 안구 전면과 일치하도록 완전 밀착
  stroke(0, 150, 255); strokeWeight(2.5 / zoom); noFill();
  
  // 시각적 피드백: 눈 모형 상태에 따라 수정체 두께(두껍게/얇게) 미세 조절
  let thicknessFactor = (eyeMode === 'myopia') ? 14 : (eyeMode === 'hyperopia' ? 6 : 9);
  
  push();
  translate(lensX, 0);
  beginShape();
  // 안구 전면 원호 라인에 맞춰 자연스러운 슬림 볼록렌즈 구현
  for(let a = -0.55; a <= 0.55; a += 0.05) vertex(cos(a)*10 - 10 + thicknessFactor, sin(a)*115);
  for(let a = 0.55; a >= -0.55; a -= 0.05) vertex(-cos(a)*10 + 10 - thicknessFactor, sin(a)*115);
  endShape(CLOSE);
  pop();
  fill(80); noStroke(); text("수정체", lensX - 18, 132);

  // 3. 안경 렌즈 렌더링 (수정체 전방에 일정 거리 이격 배치)
  let glassX = lensX - 70;
  if (glassesMode !== 'none') {
    stroke(0, 180, 180); strokeWeight(2.5 / zoom); noFill();
    if (glassesMode === 'concave') {
      line(glassX - 8, -55, glassX + 8, -55);
      line(glassX - 8, 55, glassX + 8, 55);
      arc(glassX - 16, 0, 26, 110, -HALF_PI+0.2, HALF_PI-0.2);
      arc(glassX + 16, 0, 26, 110, HALF_PI+0.2, -HALF_PI-0.2);
    } else if (glassesMode === 'convex') {
      beginShape();
      for(let a = -0.5; a <= 0.5; a += 0.1) vertex(glassX + cos(a)*15 - 12, sin(a)*110);
      for(let a = 0.5; a >= -0.5; a -= 0.1) vertex(glassX - cos(a)*15 + 12, sin(a)*110);
      endShape(CLOSE);
    }
  }

  // 4. 피실험체 물체(초록색 화살표) 조절 처리
  if (dragging) {
    objX = (mouseX - (width / 2 - 120)) / zoom;
    objH = (mouseY - height / 2) / zoom;
    if(objX > glassX - 25) objX = glassX - 25; // 안경과 겹치지 않도록 방어선 구축
  }
  drawArrow(objX, 0, objX, objH, color(0, 200, 0), 5);

  // 5. 시력 교정 물리 연산 및 결합 조건식 처리
  let eff_f = f_eye;
  // 안경 결합 조화 조건문 최적화 (정상안 수치인 186.67에 정밀 안착되도록 매핑)
  if (eyeMode === 'myopia' && glassesMode === 'concave') eff_f = 186.67;   
  if (eyeMode === 'hyperopia' && glassesMode === 'convex') eff_f = 186.67; 
  if (eyeMode === 'myopia' && glassesMode === 'convex') eff_f = 130;    
  if (eyeMode === 'hyperopia' && glassesMode === 'concave') eff_f = 270;  

  let do_dist = lensX - objX; // 물체와 수정체 사이의 실제 물리적 거리
  let relativeImgX = (do_dist * eff_f) / (do_dist - eff_f);
  let imgX = lensX + relativeImgX; // 최종 상이 맺히는 X 절대 좌표
  let imgH = -(relativeImgX / do_dist) * objH;

  // 안경 렌즈 가상 굴절률 보정을 위한 높이(Y) 계산 변수
  let f_glass = (glassesMode === 'concave') ? -320 : (glassesMode === 'convex' ? 450 : Infinity);
  let r1_yLens = objH; 
  if (glassesMode !== 'none') {
    let alpha = objH / -f_glass;
    r1_yLens = objH + alpha * (lensX - glassX);
  }

  // --- [오류 수정 2] 주황색 광선: 평행선이 항상 수정체 면(lensX)까지 도달 후 굴절 ---
  stroke(255, 120, 0); strokeWeight(2 / zoom); noFill();
  if (glassesMode !== 'none') {
    line(objX, objH, glassX, objH);     // 물체 -> 안경면 (평행)
    line(glassX, objH, lensX, r1_yLens); // 안경면 -> 수정체면 (1차 굴절)
  } else {
    line(objX, objH, lensX, objH);      // 맨눈일 때: 물체 -> 수정체면까지 다이렉트 평행
  }
  line(lensX, r1_yLens, imgX, imgH);     // 수정체면 -> 최종 상점 (2차 굴절)
  line(imgX, imgH, width, r1_yLens + (imgH - r1_yLens) * ((width - lensX) / relativeImgX)); // 안구 후방 연장선

  // --- [오류 수정 3] 파란색 광선: 수정체 정중앙 (lensX, 0)을 무조건 일직선으로 관통 ---
  stroke(0, 0, 255);
  line(objX, objH, width, (objH / (objX - lensX)) * (width - lensX));

  // 6. 맺히는 상 (분홍색 화살표) 표현
  let distToRetina = abs(imgX - retinaX);
  let opacity = map(distToRetina, 0, 120, 255, 30);
  opacity = constrain(opacity, 30, 255);
  
  let imgColor = color(255, 0, 150, opacity);
  drawArrow(imgX, 0, imgX, imgH, imgColor, 4);

  pop();
  
  // 하단 텍스트 정보 시스템 업데이트
  fill(40); noStroke(); textSize(15);
  let statusText = "💡 현재 상태: ";
  if (eyeMode === 'normal' && glassesMode === 'none') statusText += "정상안입니다. 초점이 망막에 정확히 일치합니다.";
  else if (eyeMode === 'myopia' && glassesMode === 'none') statusText += "근시안입니다. 수정체가 두꺼워 상이 망막 앞에 맺힙니다.";
  else if (eyeMode === 'myopia' && glassesMode === 'concave') statusText += "근시 교정 완료! 오목렌즈가 빛을 적절히 퍼뜨려 초점을 망막 위로 밀어줍니다.";
  else if (eyeMode === 'hyperopia' && glassesMode === 'none') statusText += "원시안입니다. 수정체가 얇아 상이 망막 뒤에 맺힙니다.";
  else if (eyeMode === 'hyperopia' && glassesMode === 'convex') statusText += "원시 교정 완료! 볼록렌즈가 빛을 미리 모아주어 초점을 망막 위로 당겨줍니다.";
  else statusText += "잘못된 안경 렌즈 선택으로 초점이 망막에서 더욱 멀어집니다.";
  
  text(statusText, 25, 40);
}

function drawArrow(x1, y1, x2, y2, clr, sz) {
  stroke(clr); strokeWeight(sz / zoom);
  line(x1, y1, x2, y2);
  push();
  translate(x2, y2);
  let angle = atan2(y2 - y1, x2 - x1);
  rotate(angle);
  fill(clr); noStroke();
  let headSize = 10 / zoom;
  triangle(0, 0, -headSize, -headSize/2, -headSize, headSize/2);
  pop();
}

function mousePressed() {
  let d = dist((mouseX - (width/2 - 120))/zoom, (mouseY - height/2)/zoom, objX, objH);
  if (d < 30) dragging = true;
}

function mouseReleased() {
  dragging = false;
}
</script>

</body>
</html>
